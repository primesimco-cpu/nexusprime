# ═══════════════════════════════════════════════════════
# NEXUS AI — Docker Compose
# Services: api, redis, postgres, nginx, prometheus, grafana
# ═══════════════════════════════════════════════════════

name: nexus-ai

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"
    labels: "service,env"

x-api-env: &api-env
  NODE_ENV: ${NODE_ENV:-development}
  PORT: 3001
  DATABASE_URL: postgres://nexus:${POSTGRES_PASSWORD:-nexus_dev}@postgres:5432/nexus
  REDIS_URL: redis://:${REDIS_PASSWORD:-nexus_dev}@redis:6379
  JWT_SECRET: ${JWT_SECRET:-nexus-local-dev-secret-change-in-prod}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:3000}
  LOG_LEVEL: ${LOG_LEVEL:-info}

services:

  # ── API Server ──────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    image: nexus-ai/api:${TAG:-latest}
    container_name: nexus-api
    restart: unless-stopped
    environment:
      <<: *api-env
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - api-logs:/app/logs
    networks:
      - nexus-internal
      - nexus-external
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.nexus.ai`)"
      - "traefik.http.routers.api.tls=true"

  # ── API Replica (for load balancing demo) ──────────────
  api-2:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    image: nexus-ai/api:${TAG:-latest}
    container_name: nexus-api-2
    restart: unless-stopped
    environment:
      <<: *api-env
    depends_on:
      - api
    volumes:
      - api-logs-2:/app/logs
    networks:
      - nexus-internal
    logging: *default-logging
    profiles:
      - scale

  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus_dev}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - nexus-internal
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-nexus_dev}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-data:/data
    networks:
      - nexus-internal
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-nexus_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 300M

  # ── Nginx Reverse Proxy ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nexus-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - api
    networks:
      - nexus-external
      - nexus-internal
    logging: *default-logging
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Prometheus ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: nexus-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    networks:
      - nexus-internal
    logging: *default-logging
    profiles:
      - monitoring

  # ── Grafana ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: nexus-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-nexus_grafana}
      GF_SERVER_ROOT_URL: https://grafana.nexus.ai
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3100:3000"
    depends_on:
      - prometheus
    networks:
      - nexus-internal
    logging: *default-logging
    profiles:
      - monitoring

  # ── Queue Worker ────────────────────────────────────────
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    image: nexus-ai/api:${TAG:-latest}
    container_name: nexus-worker
    restart: unless-stopped
    command: ["node", "src/workers/queue-processor.js"]
    environment:
      <<: *api-env
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      WORKER_TYPE: queue
    depends_on:
      - redis
      - postgres
    volumes:
      - worker-logs:/app/logs
    networks:
      - nexus-internal
    logging: *default-logging
    profiles:
      - workers
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

networks:
  nexus-internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.0.0/24
  nexus-external:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  api-logs:
    driver: local
  api-logs-2:
    driver: local
  nginx-logs:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  worker-logs:
    driver: local

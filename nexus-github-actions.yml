# ═══════════════════════════════════════════════════════
# NEXUS AI — GitHub Actions CI/CD Pipeline
# Stages: lint → test → security → build → staging → prod
# Triggers: PR (lint+test), main (full), tag (prod deploy)
# ═══════════════════════════════════════════════════════

name: NEXUS AI — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]
      skip_tests:
        description: 'Skip tests (emergency deploy only)'
        type: boolean
        default: false

# Cancel in-progress runs for same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/nexus-api
  NODE_VERSION: '22'
  CACHE_KEY_PREFIX: nexus-ai-v1

jobs:

  # ══════════════════════════════════════════════════════
  # JOB 1: Code Quality & Lint
  # ══════════════════════════════════════════════════════
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Syntax check — ai-engine
        run: node --check src/core/ai-engine.js

      - name: Syntax check — server
        run: node --check src/server.js

      - name: Check for secrets in code
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dependency audit
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true

  # ══════════════════════════════════════════════════════
  # JOB 2: Full Test Suite
  # ══════════════════════════════════════════════════════
  test:
    name: Test Suite (79 tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality
    if: ${{ !inputs.skip_tests }}
    strategy:
      matrix:
        node: ['20', '22']
        suite: ['unit', 'integration', 'load', 'security']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run master test suite
        run: node src/tests/master-test.js
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-for-ci-only
          TEST_SUITE: ${{ matrix.suite }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-node${{ matrix.node }}-${{ matrix.suite }}
          path: test-results/
          retention-days: 7

  # ══════════════════════════════════════════════════════
  # JOB 3: Security Scanning
  # ══════════════════════════════════════════════════════
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          languages: javascript

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'nexus-ai'
          path: '.'
          format: 'JSON'
          args: '--failOnCVSS 8'
        continue-on-error: true

  # ══════════════════════════════════════════════════════
  # JOB 4: Build & Push Docker Image
  # ══════════════════════════════════════════════════════
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test, security]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
      id-token: write    # For OIDC signing
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Sign image with Cosign (supply chain security)
        uses: sigstore/cosign-installer@v3
      - run: |
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      - name: Scan built image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

  # ══════════════════════════════════════════════════════
  # JOB 5: Deploy to Staging
  # ══════════════════════════════════════════════════════
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://api-staging.nexus.ai
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_STAGING_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name nexus-staging --region eu-west-1

      - name: Deploy to staging
        run: |
          kubectl set image deployment/nexus-api \
            api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image-digest }} \
            -n nexus-ai-staging

          kubectl rollout status deployment/nexus-api \
            -n nexus-ai-staging \
            --timeout=5m

      - name: Run smoke tests against staging
        run: |
          STAGING_URL="https://api-staging.nexus.ai"
          
          echo "→ Health check..."
          curl -sf "$STAGING_URL/health" | jq .status
          
          echo "→ Auth endpoint..."
          curl -sf -X POST "$STAGING_URL/auth/signup" \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke@test.com","password":"test123","name":"Smoke Test"}' \
            | jq .plan
          
          echo "→ Metrics endpoint..."
          curl -sf "$STAGING_URL/metrics" | jq .uptime
          
          echo "✓ All smoke tests passed"

      - name: Notify Slack — staging deploy
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: 'C_DEPLOY_CHANNEL'
          slack-message: |
            🚀 *NEXUS AI* deployed to *staging*
            Branch: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`
            URL: https://api-staging.nexus.ai
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  # ══════════════════════════════════════════════════════
  # JOB 6: Integration Tests on Staging
  # ══════════════════════════════════════════════════════
  integration-staging:
    name: Integration Tests on Staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: deploy-staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run E2E test suite against staging
        run: |
          export API_URL="https://api-staging.nexus.ai"
          node src/tests/e2e/staging-suite.js
        env:
          STAGING_API_KEY: ${{ secrets.STAGING_API_KEY }}

  # ══════════════════════════════════════════════════════
  # JOB 7: Deploy to Production (tags only)
  # ══════════════════════════════════════════════════════
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build, integration-staging]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://api.nexus.ai
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (prod)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Update kubeconfig (prod)
        run: aws eks update-kubeconfig --name nexus-production --region eu-west-1

      - name: Create database backup before deploy
        run: |
          kubectl exec -n nexus-ai \
            $(kubectl get pod -n nexus-ai -l app=nexus-postgres -o jsonpath='{.items[0].metadata.name}') \
            -- pg_dump -U nexus nexus | gzip > backup-$(date +%Y%m%d-%H%M%S).sql.gz
          aws s3 cp backup-*.sql.gz s3://nexus-backups/pre-deploy/

      - name: Blue-green deployment
        run: |
          # Deploy to green (new)
          kubectl set image deployment/nexus-api \
            api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image-digest }} \
            -n nexus-ai

          # Wait for rollout
          kubectl rollout status deployment/nexus-api \
            -n nexus-ai \
            --timeout=10m

          echo "✓ Production rollout complete"

      - name: Production smoke test
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -sf https://api.nexus.ai/health | jq -r .status)
            if [ "$STATUS" = "healthy" ]; then
              echo "✓ Production healthy (attempt $i)"
              exit 0
            fi
            sleep 5
          done
          echo "✗ Production health check failed"
          kubectl rollout undo deployment/nexus-api -n nexus-ai
          exit 1

      - name: Tag successful deploy
        run: |
          git tag -a "deployed-$(date +%Y%m%d-%H%M%S)" \
            -m "Production deploy: ${{ github.sha }}"
          git push origin --tags

      - name: Notify Slack — production deploy
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: 'C_DEPLOY_CHANNEL'
          slack-message: |
            ✅ *NEXUS AI v${{ github.ref_name }}* deployed to *PRODUCTION*
            Commit: `${{ github.sha }}`
            URL: https://api.nexus.ai
            Deployed by: ${{ github.actor }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Notify Slack — on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: 'C_ALERTS_CHANNEL'
          slack-message: |
            🚨 *NEXUS AI PRODUCTION DEPLOY FAILED*
            Tag: ${{ github.ref_name }}
            Actor: ${{ github.actor }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  # ══════════════════════════════════════════════════════
  # JOB 8: Performance Benchmark
  # ══════════════════════════════════════════════════════
  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          curl -fsSL https://github.com/grafana/k6/releases/download/v0.49.0/k6-v0.49.0-linux-amd64.tar.gz \
            | tar -xz && mv k6-v0.49.0-linux-amd64/k6 /usr/local/bin/

      - name: Run k6 load test
        run: |
          k6 run \
            --vus 50 \
            --duration 60s \
            --out json=k6-results.json \
            ci-cd/k6-load-test.js
        env:
          BASE_URL: https://api-staging.nexus.ai

      - name: Parse and assert benchmarks
        run: |
          node -e "
          const fs = require('fs');
          const results = JSON.parse(fs.readFileSync('k6-results.json','utf8'));
          const p95 = results.metrics?.http_req_duration?.values?.['p(95)'];
          const rps = results.metrics?.http_reqs?.values?.rate;
          console.log('p95 latency:', p95?.toFixed(0) + 'ms');
          console.log('RPS:', rps?.toFixed(0));
          if (p95 > 500) { console.error('FAIL: p95 > 500ms'); process.exit(1); }
          if (rps < 100) { console.error('FAIL: RPS < 100'); process.exit(1); }
          console.log('✓ Performance benchmarks passed');
          "

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: k6-benchmark-${{ github.sha }}
          path: k6-results.json
          retention-days: 30

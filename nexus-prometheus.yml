# ═══════════════════════════════════════════════════════
# NEXUS AI — Prometheus Configuration
# Scrape targets: api, redis, postgres, node-exporter
# ═══════════════════════════════════════════════════════

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: nexus-production
    region: eu-west-1

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: nexus-api
    static_configs:
      - targets: ['api:3001']
    metrics_path: /metrics
    scrape_interval: 15s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: [nexus-ai]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__

---
# ═══════════════════════════════════════════════════════
# Alerting Rules
# ═══════════════════════════════════════════════════════

groups:
  - name: nexus-api-availability
    interval: 30s
    rules:
      - alert: NexusAPIDown
        expr: up{job="nexus-api"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "NEXUS AI API is DOWN"
          description: "API instance {{ $labels.instance }} has been down for 1 minute"
          runbook: "https://docs.nexus.ai/runbooks/api-down"

      - alert: NexusHighErrorRate
        expr: |
          rate(nexus_http_requests_total{status=~"5.."}[5m])
          /
          rate(nexus_http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "High error rate: {{ $value | humanizePercentage }}"
          description: "Error rate exceeds 5% for 2 minutes"

      - alert: NexusHighLatency
        expr: |
          histogram_quantile(0.95,
            rate(nexus_http_request_duration_seconds_bucket[5m])
          ) > 0.5
        for: 3m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "p95 latency {{ $value | humanizeDuration }} exceeds 500ms"

      - alert: NexusHighMemory
        expr: |
          container_memory_usage_bytes{container="api"} 
          / container_spec_memory_limit_bytes{container="api"} > 0.85
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "API memory at {{ $value | humanizePercentage }} of limit"

  - name: nexus-api-slos
    rules:
      # SLO: 99.9% availability (< 43.8 min downtime/month)
      - alert: NexusSLOAvailabilityBreach
        expr: |
          (1 - (
            rate(nexus_http_requests_total{status!~"5.."}[30d])
            / rate(nexus_http_requests_total[30d])
          )) > 0.001
        labels:
          severity: critical
          team: platform
          slo: availability
        annotations:
          summary: "SLO breach: availability below 99.9%"

      # SLO: p99 latency < 1s
      - alert: NexusSLOLatencyBreach
        expr: |
          histogram_quantile(0.99,
            rate(nexus_http_request_duration_seconds_bucket[1h])
          ) > 1.0
        labels:
          severity: warning
          team: platform
          slo: latency

  - name: nexus-business-metrics
    rules:
      - alert: NexusUserSignupDrop
        expr: |
          rate(nexus_user_signups_total[1h]) < 
          rate(nexus_user_signups_total[1h] offset 1d) * 0.5
        for: 30m
        labels:
          severity: warning
          team: growth
        annotations:
          summary: "Signup rate dropped >50% vs same time yesterday"

      - alert: NexusHighChurn
        expr: nexus_user_churn_rate > 0.05
        for: 1h
        labels:
          severity: warning
          team: growth
        annotations:
          summary: "Monthly churn rate {{ $value | humanizePercentage }} exceeds 5%"

      - alert: NexusAgentFailureRate
        expr: |
          rate(nexus_agent_executions_total{status="failed"}[15m])
          / rate(nexus_agent_executions_total[15m]) > 0.1
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Agent failure rate {{ $value | humanizePercentage }} exceeds 10%"

  - name: nexus-infrastructure
    rules:
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Redis is DOWN — memory and caching unavailable"

      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is DOWN — database unavailable"

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory at {{ $value | humanizePercentage }}"

      - alert: PostgresConnectionsHigh
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $value }} active Postgres connections (limit 100)"

      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk space below 15% on {{ $labels.mountpoint }}"

      - alert: KubernetesPodsNotReady
        expr: |
          kube_deployment_status_replicas_ready{namespace="nexus-ai"}
          / kube_deployment_spec_replicas{namespace="nexus-ai"} < 0.67
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Less than 67% of NEXUS pods are ready"
